<template>
    <div class="note-capture">
        <h3 class="capture-title">Quick Note</h3>
        <div class="capture-form">
            <!-- Custom upward-opening dropdown (lightning-combobox clips at panel bottom) -->
            <div class="type-select">
                <button class="type-trigger" onclick={toggleDropdown} type="button">
                    {noteType}
                    <span class="trigger-icon">&#9662;</span>
                </button>
                <template if:true={isDropdownOpen}>
                    <ul class="type-dropdown" role="listbox">
                        <template for:each={noteTypeOptions} for:item="opt">
                            <li key={opt.value}
                                class="type-option"
                                role="option"
                                data-value={opt.value}
                                onclick={handleOptionClick}>
                                {opt.label}
                            </li>
                        </template>
                    </ul>
                </template>
            </div>
            <div class="note-input-row">
                <lightning-textarea
                    label="Note"
                    value={noteText}
                    onchange={handleTextChange}
                    variant="label-hidden"
                    placeholder="Capture consultation note..."
                    max-length="5000"
                    class="note-textarea"
                ></lightning-textarea>
                <lightning-button
                    label="Add"
                    variant="brand"
                    onclick={handleAddNote}
                    disabled={isAddDisabled}
                    class="add-btn"
                ></lightning-button>
            </div>
        </div>
        <template if:true={isSaving}>
            <lightning-spinner alternative-text="Saving" size="small" class="saving-spinner"></lightning-spinner>
        </template>
    </div>
</template>
